name: pulse-check

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pulse-check-backend:production
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-pulse-check-backend}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OIDC_ISSUER: ${OIDC_ISSUER:?set OIDC_ISSUER}
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:?set OIDC_JWKS_URL}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-pulse-check-api}
      OIDC_REQUIRED_ROLE: ${OIDC_REQUIRED_ROLE:-}
      DATABASE_URL: postgres://${PULSE_CHECK_DB_USER:-pulse_check}:${PULSE_CHECK_DB_PASSWORD:?set PULSE_CHECK_DB_PASSWORD}@pulse-check-postgres:5432/${PULSE_CHECK_DB_NAME:-pulse_check}?sslmode=disable
      STATUS_SET_MAX_STATUSES: ${STATUS_SET_MAX_STATUSES:-50}
    expose:
      - "8080"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      pulse-check-postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pulse-check-backend:production
    entrypoint: ["/app/pulse-check-migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: postgres://${PULSE_CHECK_DB_USER:-pulse_check}:${PULSE_CHECK_DB_PASSWORD:?set PULSE_CHECK_DB_PASSWORD}@pulse-check-postgres:5432/${PULSE_CHECK_DB_NAME:-pulse_check}?sslmode=disable
    depends_on:
      pulse-check-postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_PUBLIC_URL: ${APP_PUBLIC_URL:?set APP_PUBLIC_URL}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:?set VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-pulse-check}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-pulse-check-frontend}
        VITE_OTEL_EXPORTER_OTLP_ENDPOINT: ${VITE_OTEL_EXPORTER_OTLP_ENDPOINT:-}
        VITE_OTEL_SERVICE_NAME: ${VITE_OTEL_SERVICE_NAME:-pulse-check-frontend}
    image: pulse-check-frontend:production
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  pulse-check-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PULSE_CHECK_DB_NAME:-pulse_check}
      POSTGRES_USER: ${PULSE_CHECK_DB_USER:-pulse_check}
      POSTGRES_PASSWORD: ${PULSE_CHECK_DB_PASSWORD:?set PULSE_CHECK_DB_PASSWORD}
    volumes:
      - pulse-check-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start", "--import-realm"]
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:?set KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?set KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/pulse-check-realm.json:/opt/keycloak/data/import/pulse-check-realm.json:ro
      - ./keycloak/themes/pulse-check:/opt/keycloak/themes/pulse-check:ro
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8081}:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'",
        ]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  keycloak-postgres-data:
  pulse-check-postgres-data:
