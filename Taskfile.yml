version: "3"

vars:
  COMPOSE: docker compose -f local-compose.yaml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Build and start the local stack
    cmds:
      - "{{.COMPOSE}} up --build -d"
      - "{{.COMPOSE}} ps"

  down:
    desc: Stop and remove containers
    cmds:
      - "{{.COMPOSE}} down"

  restart:
    desc: Restart the local stack
    cmds:
      - task: down
      - task: up

  backend-restart:
    desc: Rebuild and restart only the backend service
    cmds:
      - "{{.COMPOSE}} up --build -d --no-deps --force-recreate backend"
      - "{{.COMPOSE}} ps backend"

  frontend-restart:
    desc: Rebuild and restart only the frontend service
    cmds:
      - "{{.COMPOSE}} up --build -d --no-deps --force-recreate frontend"
      - "{{.COMPOSE}} ps frontend"

  build:
    desc: Build Docker images
    cmds:
      - "{{.COMPOSE}} build"

  logs:
    desc: Follow logs for all services
    cmds:
      - "{{.COMPOSE}} logs -f"

  backend-logs:
    desc: Follow backend logs
    cmds:
      - "{{.COMPOSE}} logs -f backend"

  frontend-logs:
    desc: Follow frontend logs
    cmds:
      - "{{.COMPOSE}} logs -f frontend"

  ps:
    desc: Show service status
    cmds:
      - "{{.COMPOSE}} ps"

  db-up:
    desc: Start only the local application database
    cmds:
      - "{{.COMPOSE}} up -d pulse-check-postgres"

  migrate:up:
    desc: Apply local backend database migrations
    cmds:
      - task: db-up
      - "{{.COMPOSE}} build backend"
      - "{{.COMPOSE}} run --rm --no-deps --entrypoint /app/pulse-check-migrate backend up"

  migrate:status:
    desc: Show local backend database migration status
    cmds:
      - task: db-up
      - "{{.COMPOSE}} build backend"
      - "{{.COMPOSE}} run --rm --no-deps --entrypoint /app/pulse-check-migrate backend status"

  migrate:version:
    desc: Show local backend database migration version
    cmds:
      - task: db-up
      - "{{.COMPOSE}} build backend"
      - "{{.COMPOSE}} run --rm --no-deps --entrypoint /app/pulse-check-migrate backend version"

  migrate:down:
    desc: Roll back one local backend database migration
    prompt: This will roll back one local backend database migration. Continue?
    cmds:
      - task: db-up
      - "{{.COMPOSE}} build backend"
      - "{{.COMPOSE}} run --rm --no-deps --entrypoint /app/pulse-check-migrate backend down"

  clean:
    desc: Stop the stack and remove local images
    cmds:
      - "{{.COMPOSE}} down --rmi local --remove-orphans"
