name: pulse-check

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pulse-check-backend:local
    environment:
      HTTP_ADDR: :8080
      OTEL_SERVICE_NAME: pulse-check-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OIDC_ISSUER: http://localhost:8081/realms/pulse-check
      OIDC_JWKS_URL: http://keycloak:8080/realms/pulse-check/protocol/openid-connect/certs
      OIDC_AUDIENCE: pulse-check-api
      DATABASE_URL: postgres://pulse_check:pulse-check-local-app-db-password@pulse-check-postgres:5432/pulse_check?sslmode=disable
      STATUS_SET_MAX_STATUSES: ${STATUS_SET_MAX_STATUSES:-50}
    ports:
      - "8080:8080"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      pulse-check-postgres:
        condition: service_healthy
      keycloak-seed:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pulse-check-backend:local
    entrypoint: ["/app/pulse-check-migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: postgres://pulse_check:pulse-check-local-app-db-password@pulse-check-postgres:5432/pulse_check?sslmode=disable
    depends_on:
      pulse-check-postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_PUBLIC_URL: http://localhost:3000
        VITE_KEYCLOAK_URL: http://localhost:8081
        VITE_KEYCLOAK_REALM: pulse-check
        VITE_KEYCLOAK_CLIENT_ID: pulse-check-frontend
        VITE_OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
        VITE_OTEL_SERVICE_NAME: pulse-check-frontend
    image: pulse-check-frontend:local
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      keycloak-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  pulse-check-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PULSE_CHECK_DB_NAME:-pulse_check}
      POSTGRES_USER: ${PULSE_CHECK_DB_USER:-pulse_check}
      POSTGRES_PASSWORD: ${PULSE_CHECK_DB_PASSWORD:-pulse-check-local-app-db-password}
    volumes:
      - pulse-check-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  keycloak-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-pulse-check-local-db-password}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-pulse-check-local-db-password}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: http://localhost:8081
      KC_HTTP_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-pulse-check-local-admin-password}
    volumes:
      - ./keycloak/pulse-check-realm.json:/opt/keycloak/data/import/pulse-check-realm.json:ro
      - ./keycloak/themes/pulse-check:/opt/keycloak/themes/pulse-check:ro
    ports:
      - "8081:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  keycloak-seed:
    image: quay.io/keycloak/keycloak:26.6.1
    environment:
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-pulse-check-local-admin-password}
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080 \
          --realm master \
          --user "$${KEYCLOAK_ADMIN_USERNAME}" \
          --password "$${KEYCLOAK_ADMIN_PASSWORD}"

        /opt/keycloak/bin/kcadm.sh update realms/pulse-check \
          -s loginTheme=pulse-check \
          -s sslRequired=none

        FRONTEND_CLIENT_ID=$$(/opt/keycloak/bin/kcadm.sh get clients -r pulse-check -q clientId=pulse-check-frontend --fields id --format csv --noquotes | tail -n 1)
        /opt/keycloak/bin/kcadm.sh update "clients/$${FRONTEND_CLIENT_ID}" -r pulse-check \
          -s 'redirectUris=["http://localhost:3000/*","http://localhost:5173/*"]' \
          -s 'webOrigins=["http://localhost:3000","http://localhost:5173"]' \
          -s 'attributes."post.logout.redirect.uris"="http://localhost:3000/*##http://localhost:5173/*"'

        if ! /opt/keycloak/bin/kcadm.sh get users -r pulse-check -q username=admin --fields id --format csv --noquotes | grep -q .; then
          /opt/keycloak/bin/kcadm.sh create users -r pulse-check \
            -s username=admin \
            -s enabled=true \
            -s email=admin@pulse-check.local \
            -s emailVerified=true \
            -s firstName=Local \
            -s lastName=Admin
        fi

        ADMIN_ID=$$(/opt/keycloak/bin/kcadm.sh get users -r pulse-check -q username=admin --fields id --format csv --noquotes | tail -n 1)
        /opt/keycloak/bin/kcadm.sh set-password -r pulse-check --userid "$${ADMIN_ID}" --new-password admin
    depends_on:
      keycloak:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_started

  tempo-init:
    image: busybox:1.36
    user: "0"
    command: ["chown", "-R", "10001:10001", "/tmp/tempo"]
    volumes:
      - tempo-data:/tmp/tempo

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    depends_on:
      tempo-init:
        condition: service_completed_successfully

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:v1.2.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboard-definitions:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      prometheus:
        condition: service_started

volumes:
  alloy-data:
  grafana-data:
  keycloak-postgres-data:
  loki-data:
  prometheus-data:
  pulse-check-postgres-data:
  tempo-data:
