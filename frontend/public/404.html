<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Pulse Check</title>
    <script>
      (() => {
        const storageKey = "pulse-check-theme-mode";
        const isThemeMode = (mode) => mode === "dark" || mode === "light";
        const cookie = document.cookie
          .split("; ")
          .find((entry) => entry.startsWith(`${storageKey}=`));
        const cookieMode = cookie?.split("=")[1] ?? null;

        try {
          const mode = isThemeMode(cookieMode)
            ? cookieMode
            : localStorage.getItem(storageKey);

          if (isThemeMode(mode)) {
            document.documentElement.dataset.theme = mode;
            document.documentElement.style.colorScheme = mode;
          }
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <style>
      :root {
        color: #2e3440;
        background: #eceff4;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        --ink: #2e3440;
        --muted: #4c566a;
        --line: #d8dee9;
        --paper: #ffffff;
        --primary: #5e81ac;
        --primary-contrast: #eceff4;
        --button-hover: #4c6f9d;
        --page-bg: #eceff4;
        --page-wash: rgba(236, 239, 244, 0.88);
        --panel-wash: rgba(136, 192, 208, 0.15);
        --aurora-wash: rgba(180, 142, 173, 0.13);
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        color: #eceff4;
        background: #2e3440;
        --ink: #eceff4;
        --muted: #d8dee9;
        --line: rgba(216, 222, 233, 0.18);
        --paper: #3b4252;
        --primary: #88c0d0;
        --primary-contrast: #2e3440;
        --button-hover: #9bd1dd;
        --page-bg: #2e3440;
        --page-wash: rgba(46, 52, 64, 0.9);
        --panel-wash: rgba(136, 192, 208, 0.16);
        --aurora-wash: rgba(180, 142, 173, 0.15);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, var(--page-wash), var(--page-bg)),
          radial-gradient(circle at 18% 18%, var(--panel-wash), transparent 360px),
          radial-gradient(circle at 82% 10%, var(--aurora-wash), transparent 320px),
          var(--page-bg);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
      }

      .panel {
        width: min(640px, 100%);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 0 24px 60px rgba(46, 52, 64, 0.12);
      }

      .content {
        display: grid;
        min-height: 360px;
        place-items: center;
        padding: 48px 32px;
        text-align: center;
        background:
          linear-gradient(135deg, var(--panel-wash), transparent 58%),
          linear-gradient(225deg, var(--aurora-wash), transparent 58%);
      }

      .code {
        margin: 0;
        color: var(--primary);
        font-size: clamp(4.75rem, 18vw, 6.5rem);
        font-weight: 800;
        line-height: 0.9;
      }

      h1 {
        margin: 24px 0 0;
        color: var(--ink);
        font-size: 2rem;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 12px auto 0;
        max-width: 440px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        margin-top: 28px;
        border-radius: 8px;
        padding: 0 18px;
        background: var(--primary);
        color: var(--primary-contrast);
        font-weight: 800;
        text-decoration: none;
      }

      a:hover {
        background: var(--button-hover);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="not-found-title">
        <div class="content">
          <div>
            <p class="code" aria-hidden="true">404</p>
            <h1 id="not-found-title">Страница не найдена</h1>
            <p>Такой страницы нет или она была перемещена.</p>
            <a href="/">На главную</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
